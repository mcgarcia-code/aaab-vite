name: Check SSH Secrets

on:
  workflow_dispatch:
    inputs:
      test_connection:
        description: "Probar conexion SSH con la clave"
        required: true
        default: true
        type: boolean
      expected_fingerprint:
        description: "Fingerprint esperado (opcional, ejemplo: SHA256:xxxx)"
        required: false
        default: ""
        type: string

jobs:
  validate-ssh-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_SSH_PRIVATE_KEY: ${{ secrets.SFTP_SSH_PRIVATE_KEY }}
        run: |
          [ -n "$SFTP_HOST" ] || (echo "Missing secret: SFTP_HOST" && exit 1)
          [ -n "$SFTP_USERNAME" ] || (echo "Missing secret: SFTP_USERNAME" && exit 1)
          [ -n "$SFTP_SSH_PRIVATE_KEY" ] || (echo "Missing secret: SFTP_SSH_PRIVATE_KEY" && exit 1)
          [ -n "$SFTP_PORT" ] || echo "SFTP_PORT not set, using 22"

      - name: Setup SSH key from secret
        env:
          SFTP_SSH_PRIVATE_KEY: ${{ secrets.SFTP_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh

          if printf "%s" "$SFTP_SSH_PRIVATE_KEY" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf "%s" "$SFTP_SSH_PRIVATE_KEY" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/id_ed25519
          elif printf "%s" "$SFTP_SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_ed25519 2>/dev/null; then
            true
          else
            printf "%s" "$SFTP_SSH_PRIVATE_KEY" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/id_ed25519
          fi

          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null 2>&1 || (echo "Invalid SFTP_SSH_PRIVATE_KEY format" && exit 1)

      - name: Validate key and print fingerprint
        id: fp
        run: |
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          FINGERPRINT="$(ssh-keygen -lf ~/.ssh/id_ed25519.pub | awk '{print $2}')"
          echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"
          echo "Loaded key fingerprint: $FINGERPRINT"

      - name: Compare fingerprint (optional)
        if: ${{ inputs.expected_fingerprint != '' }}
        env:
          EXPECTED: ${{ inputs.expected_fingerprint }}
        run: |
          if [ "$EXPECTED" != "${{ steps.fp.outputs.fingerprint }}" ]; then
            echo "Fingerprint mismatch"
            echo "Expected: $EXPECTED"
            echo "Actual:   ${{ steps.fp.outputs.fingerprint }}"
            exit 1
          fi
          echo "Fingerprint matches expected value"

      - name: Prepare known_hosts
        if: ${{ inputs.test_connection }}
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS }}
        run: |
          if [ -n "$SFTP_KNOWN_HOSTS" ]; then
            printf "%s" "$SFTP_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${SFTP_PORT:-22}" -H "$SFTP_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH login (no deploy)
        if: ${{ inputs.test_connection }}
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o PreferredAuthentications=publickey \
            -o StrictHostKeyChecking=yes \
            -p "${SFTP_PORT:-22}" \
            "$SFTP_USERNAME@$SFTP_HOST" "echo SSH_OK"
